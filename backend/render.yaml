services:
  - type: web
    name: ecomzone-backend
    env: node
    region: oregon
    plan: free
    rootDir: .
    buildCommand: npm install && npm run build && npx prisma generate
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: DATABASE_URL
        fromDatabase:
          name: ecomzone_db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        value: https://ecomzone.vercel.app

databases:
  - name: ecomzone_db
    engine: postgres
    plan: free
    region: oregon
